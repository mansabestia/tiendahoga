<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoga - Micropanadería</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Aquí podés cambiar tus colores de marca */
        :root {
            --color-primario: #1a1a1a; /* Gris muy oscuro/Negro */
            --color-secundario: #f5f5f0; /* Crema/Hueso */
            --color-acento: #d4a373; /* Un tono madera/pan */
        }
        body { background-color: var(--color-secundario); color: var(--color-primario); font-family: sans-serif; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="p-4 pb-24">

    <header class="text-center my-8">
        <h1 class="text-4xl font-bold tracking-tighter italic">Hoga</h1>
        <p class="text-sm uppercase tracking-widest">Micropanadería de Masa Madre</p>
    </header>

    <div id="productos" class="grid gap-6 max-w-md mx-auto">
        <div class="card p-4 flex justify-between items-center">
            <div>
                <h3 class="font-bold text-lg">Hogaza Semillas</h3>
                <p class="text-sm text-gray-500">Masa madre, mix de 7 semillas.</p>
                <span class="font-bold text-black">$4500</span>
            </div>
            <button onclick="agregarAlCarrito('Hogaza Semillas', 4500)" class="bg-black text-white px-4 py-2 rounded-lg">+</button>
        </div>

        <div class="card p-4 flex justify-between items-center">
            <div>
                <h3 class="font-bold text-lg">Caja Patria</h3>
                <p class="text-sm text-gray-500">Pastelitos, chipá y pan de campo.</p>
                <span class="font-bold text-black">$12000</span>
            </div>
            <button onclick="agregarAlCarrito('Caja Patria', 12000)" class="bg-black text-white px-4 py-2 rounded-lg">+</button>
        </div>
    </div>

    <div id="barra-carrito" class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex justify-between items-center hidden shadow-2xl">
        <div>
            <p class="text-xs uppercase">Total estimado</p>
            <p id="total-precio" class="text-xl font-bold">$0</p>
        </div>
        <button onclick="enviarPedido()" class="bg-green-600 text-white px-6 py-3 rounded-xl font-bold">
            Pedir por WhatsApp
        </button>
    </div>

    <script>
        let carrito = [];
        let total = 0;

        function agregarAlCarrito(nombre, precio) {
            carrito.push({nombre, precio});
            total += precio;
            actualizarInterfaz();
        }

        function actualizarInterfaz() {
            const barra = document.getElementById('barra-carrito');
            if(carrito.length > 0) barra.classList.remove('hidden');
            document.getElementById('total-precio').innerText = `$${total}`;
        }

        function enviarPedido() {
            const numeroTel = "54911XXXXXXXX"; // PONÉ TU NÚMERO ACÁ (sin el +)
            const alias = "HOGA.MASAMADRE"; // TU ALIAS
            
            let mensaje = "Hola Hoga! Me gustaría hacer este pedido:\n\n";
            carrito.forEach(item => {
                mensaje += `- ${item.nombre} ($${item.precio})\n`;
            });
            mensaje += `\n*Total: $${total}*\n\n`;
            mensaje += `¿Me pasás los datos para la transferencia?\n`;
            mensaje += `_Alias: ${alias}_`;

            const url = `https://wa.me/${numeroTel}?text=${encodeURIComponent(mensaje)}`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoga | Micropanadería</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #FFBA08; color: #1a1a1a; }
        h1, h2 { font-family: 'DM Serif Display', serif; }
        .product-card { transition: transform 0.2s; border: 1px solid #e2e2d5; }
        .product-card:active { transform: scale(0.98); }
        .btn-add { background-color: #1a1a1a; color: white; transition: all 0.3s; }
        .btn-add:hover { background-color: #FFBA08; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen flex flex-col">

    <header class="pt-10 pb-6 px-6 text-center">
    <div class="flex justify-center mb-2">
        <img src="img/hoga Perfil.png" alt="Hoga Logo" class="h-24 w-auto object-contain">
    </div>
    <p class="text-[10px] uppercase tracking-[0.3em] text-gray-500 font-bold">Masa Madre • Despacho Artesanal</p>
</header>

    <main class="flex-grow p-6 space-y-8">
        
        <section>
            <h2 class="text-2xl mb-4 border-b border-black inline-block">Nuestras Hogazas</h2>
            <div class="space-y-6">
                <div class="product-card bg-white rounded-2xl p-4 flex flex-col shadow-sm">
                    <img src="https://images.unsplash.com/photo-1585478259715-876a6a81fc08?q=80&w=500" class="w-full h-40 object-cover rounded-xl mb-4" alt="Pan">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-bold text-lg leading-tight text-gray-800">Hogaza de Semillas</h3>
                            <p class="text-xs text-gray-500 mt-1 uppercase tracking-tighter">Integral y 7 semillas • 800g</p>
                        </div>
                        <span class="font-bold text-lg">$4.500</span>
                    </div>
                    <button onclick="agregar('Hogaza Semillas', 4500)" class="btn-add w-full mt-4 py-3 rounded-xl font-bold uppercase text-xs tracking-widest">Añadir al pedido</button>
                </div>
            </div>
        </section>

    </main>

    <div id="cart-ui" class="fixed bottom-6 left-6 right-6 bg-black text-white p-5 rounded-2xl shadow-2xl flex justify-between items-center hidden z-50">
        <div>
            <p id="items-count" class="text-[10px] uppercase text-gray-400">0 productos</p>
            <p id="total-price" class="text-xl font-bold font-serif">$0</p>
        </div>
        <button onclick="enviarPedido()" class="bg-[#d4a373] text-black px-6 py-3 rounded-xl font-black text-sm uppercase tracking-tighter">
            Confirmar por WhatsApp
        </button>
    </div>

    <script>
        let carrito = [];
        let total = 0;

        function agregar(nombre, precio) {
            carrito.push({nombre, precio});
            total += precio;
            document.getElementById('cart-ui').classList.remove('hidden');
            document.getElementById('items-count').innerText = `${carrito.length} productos`;
            document.getElementById('total-price').innerText = `$${total}`;
        }

        function enviarPedido() {
            const alias = "HOGA.ALIMENTO.REAL"; // <--- CAMBIÁ TU ALIAS ACÁ
            const nro = "549XXXXXXXXXX"; // <--- TU WHATSAPP CON CODIGO DE AREA SIN EL +
            
            let msg = `🥖 *PEDIDO HOGA*\n------------------\n`;
            carrito.forEach(i => msg += `• ${i.nombre}\n`);
            msg += `------------------\n*TOTAL: $${total}*\n\n`;
            msg += `Pago por transferencia al Alias:\n*${alias}*`;
            
            window.open(`https://wa.me/${nro}?text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
